<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Book -Book Application</title>
</head>
<body>
<div class="snippet-container">
    <header>
        <h1>Enter your Book Details</h1>
    </header>
    <div class="card">
        <div class="action-bar">
            <h2>Add New Book Details</h2>
        </div>
        <form action="#" th:action="@{/saveStudent}" th:object="${student}" method="POST">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" th:field="*{firstName}" placeholder="Enter first name" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" th:field="*{lastName}" placeholder="Enter last name" required>
            </div>
        </form>
    </div>
</div>

</body>
</html>
